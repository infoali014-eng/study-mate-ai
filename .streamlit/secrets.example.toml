# Copy this file to .streamlit/secrets.toml for local Google login testing.
# Never commit .streamlit/secrets.toml with real credentials.

[auth]
# Use your exact running app URL plus /oauth2callback.
# Examples:
# redirect_uri = "http://localhost:8507/oauth2callback"
# redirect_uri = "https://your-app.streamlit.app/oauth2callback"
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "replace_with_a_long_random_secret"

[auth.google]
client_id = "your_google_oauth_client_id_here"
client_secret = "your_google_oauth_client_secret_here"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"
