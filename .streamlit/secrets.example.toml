# Copy this file to .streamlit/secrets.toml for local secrets testing.
# Never commit .streamlit/secrets.toml with real credentials.
# Google login is temporarily disabled in the app.

# Required if you want users to save Gemini keys securely per account.
# Use a long random value. Do not reuse this placeholder.
APP_ENCRYPTION_KEY = "replace_with_a_long_random_secret_for_saved_user_keys"

# Optional shared provider keys for private deployments only.
# Public deployments should keep REQUIRE_USER_API_KEYS=true and let each user
# save their own key in AI Settings.
GEMINI_API_KEY = "your_gemini_api_key_here"
GEMINI_MODEL = "gemini-2.0-flash"
OPENAI_API_KEY = "your_openai_api_key_here"
OPENAI_MODEL = "gpt-5.4-mini"
GROQ_API_KEY = "your_groq_api_key_here"
GROQ_MODEL = "llama-3.1-8b-instant"
REQUIRE_USER_API_KEYS = "true"

# Optional initial admin account. Use real values only in private secrets,
# never in source code or committed files.
ADMIN_EMAIL = "admin@example.com"
ADMIN_PASSWORD = "your_secure_admin_password"
ADMIN_NAME = "Admin User"

[auth]
# Reserved for future Google login support.
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "replace_with_a_long_random_secret"
client_id = "your_google_oauth_client_id_here"
client_secret = "your_google_oauth_client_secret_here"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"
